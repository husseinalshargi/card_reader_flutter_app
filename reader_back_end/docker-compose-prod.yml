services:
  fastapi_app:
    # this line using '.' will make docker use the Dockerfile saved in the same dir, this is used instead of image 
    image: svrtiq/reader_back_end
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - reader_backend_logs:/app/Logs
    depends_on:
      - db

  db:
    image: mysql:8.0
    # this will make it always restart and work even if the python app is down for any reason
    restart: always
    #specify where the env vars will be
    env_file:
      - .env
    # actually use the env vars
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  reader_backend_logs:
